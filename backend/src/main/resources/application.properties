# ==============================
# Database Configuration
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate detects MySQL automatically.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# Server
# ==============================
server.port=${PORT:8080}

# ==============================
# Spring Security
# ==============================
spring.security.user.name=admin
spring.security.user.password=admin123

# ==============================
# Salesforce
# ==============================
salesforce.alias=worldwidepay-dev
salesforce.instance-url=YOUR_SALESFORCE_URL
salesforce.api-version=v66.0

# ==============================
# Razorpay
# ==============================
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_SECRET

# ==============================
# OTP
# ==============================
otp.expiry.minutes=5
otp.aes.secret.key=YOUR_KEY

app.otp.rate-limit.enabled=false
app.otp.bypass.enabled=true

# ==============================
# SMS Configuration
# ==============================
sms.provider=console
app.otp.fallback-to-console.enabled=true

# Twilio (Disabled)
twilio.account.sid=
twilio.auth.token=
twilio.from.number=

# MSG91 (Disabled)
msg91.auth.key=
msg91.sender.id=PAYSPH
msg91.template.id=

# Fast2SMS (Disabled)
fast2sms.api.key=

# ==============================
# Firebase
# ==============================
firebase.config.path=