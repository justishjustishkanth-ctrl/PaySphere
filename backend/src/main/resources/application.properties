0# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=${PORT:8081}

# Spring Security Config (Basic authentication credentials)
spring.security.user.name=admin
spring.security.user.password=admin123

# Salesforce Configuration
salesforce.alias=worldwidepay-dev
salesforce.instance-url=YOUR_SALESFORCE_URL
salesforce.api-version=v66.0

# Razorpay Configuration
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_SECRET

# OTP Configuration
otp.expiry.minutes=5
# AES-256 encryption key for OTP storage (must be exactly 16 or 32 printable chars)
otp.aes.secret.key=YOUR_KEY

# OTP Rate Limiting
# Set to false for local development to disable OTP cooldown/throttling.
# Set to true in production to enforce max 3 OTPs per mobile per hour.
app.otp.rate-limit.enabled=false
app.otp.bypass.enabled=true

# ── SMS Provider Configuration ─────────────────────────────────────────────
# Active provider: console | twilio | msg91 | fast2sms
# Use 'console' for local dev — OTP is printed to the backend server log.
# Switch to 'twilio' (and fill credentials below) for production.
sms.provider=twilio
app.otp.fallback-to-console.enabled=true

# Twilio Credentials (https://console.twilio.com)
# Account SID and Auth Token from Twilio Console > Account Info

twilio.account.sid=YOUR_TWILIO_SID
twilio.auth.token=YOUR_TWILIO_TOKEN
twilio.from.number=${TWILIO_FROM_NUMBER}

# MSG91 Credentials (https://control.msg91.com)
# Auth key from MSG91 Dashboard > API
msg91.auth.key=YOUR_MSG91_AUTH_KEY
msg91.sender.id=PAYSPH
# Template ID from MSG91 > SMS > Templates
msg91.template.id=YOUR_MSG91_TEMPLATE_ID

# Fast2SMS Credentials (https://www.fast2sms.com/dashboard)
# API Key from Fast2SMS Dashboard > Dev API
fast2sms.api.key=YOUR_FAST2SMS_API_KEY

# Firebase Config Path Settings
firebase.config.path=${FIREBASE_CONFIG_PATH}



